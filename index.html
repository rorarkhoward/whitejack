<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blackjack Training Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.felt { background: #064e3b; } .hidden { display: none; }</style>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <nav class="bg-slate-800 p-4 flex justify-around border-b border-slate-700">
        <button onclick="showPage('play')" class="font-bold">PLAY</button>
        <button onclick="showPage('stats')" class="font-bold">STATS & ANALYSIS</button>
        <button onclick="showPage('chart')" class="font-bold">FULL CHART</button>
    </nav>

    <main class="p-6">
        <div id="page-play" class="flex flex-col items-center">
            <div class="felt w-full max-w-lg rounded-2xl p-8 border-4 border-yellow-800 shadow-2xl">
                <div class="text-center mb-10">
                    <p class="text-xs text-yellow-500 mb-2">DEALER UP</p>
                    <div id="dealer-card-ui" class="w-16 h-24 bg-white text-black rounded-lg mx-auto flex items-center justify-center text-3xl font-bold">?</div>
                </div>
                <div class="flex justify-center gap-4 mb-10">
                    <div id="p-card-1" class="w-16 h-24 bg-white text-black rounded-lg flex items-center justify-center text-3xl font-bold">?</div>
                    <div id="p-card-2" class="w-16 h-24 bg-white text-black rounded-lg flex items-center justify-center text-3xl font-bold">?</div>
                </div>
                <div id="feedback" class="text-center mb-6 h-6">Press Start to Begin</div>
                <div class="flex justify-center gap-2">
                    <button onclick="handleUserMove('H')" class="bg-blue-600 px-4 py-2 rounded font-bold">HIT</button>
                    <button onclick="handleUserMove('S')" class="bg-red-600 px-4 py-2 rounded font-bold">STAND</button>
                    <button onclick="handleUserMove('D')" class="bg-yellow-600 px-4 py-2 rounded font-bold">DOUBLE</button>
                    <button onclick="handleUserMove('Y')" class="bg-purple-600 px-4 py-2 rounded font-bold">SPLIT</button>
                </div>
                <button id="reveal-btn" onclick="showReveal()" class="hidden w-full mt-4 text-xs underline">REVEAL CORRECT LOGIC</button>
            </div>
            <button onclick="dealNewHand()" class="mt-8 bg-green-500 px-8 py-3 rounded-full font-bold shadow-lg">START HAND</button>
        </div>

        <div id="page-stats" class="hidden max-w-xl mx-auto">
            <h2 class="text-2xl font-bold mb-6 text-center">Performance Analysis</h2>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-slate-800 p-4 rounded">
                    <p class="text-xs text-slate-400">TODAY'S ACCURACY</p>
                    <p id="acc-today" class="text-2xl font-bold text-green-400">0%</p>
                </div>
                <div class="bg-slate-800 p-4 rounded">
                    <p class="text-xs text-slate-400">WEEKLY ACCURACY</p>
                    <p id="acc-week" class="text-2xl font-bold text-blue-400">0%</p>
                </div>
            </div>
            <div class="bg-slate-800 p-4 rounded border-l-4 border-red-500">
                <p class="text-xs text-slate-400 uppercase">Biggest Mistake Area</p>
                <p id="top-mistake" class="text-lg font-bold">No data yet</p>
            </div>
        </div>

        <div id="page-chart" class="hidden flex justify-center">
            <img src="YOUR_UPLOADED_IMAGE.jpg" class="max-w-full rounded shadow-xl">
        </div>
    </main>

    <script src="strategy.js"></script>
    <script src="stats.js"></script>
    <script src="game.js"></script>
    <script>
        function showPage(id) {
            ['play','stats','chart'].forEach(p => document.getElementById(`page-${p}`).classList.add('hidden'));
            document.getElementById(`page-${id}`).classList.remove('hidden');
            if(id === 'stats') refreshStats();
        }
        function updateUI() {
            document.getElementById('dealer-card-ui').innerText = gameState.dealerUpcard === 11 ? 'A' : gameState.dealerUpcard;
            document.getElementById('p-card-1').innerText = gameState.playerHand[0] === 11 ? 'A' : gameState.playerHand[0];
            document.getElementById('p-card-2').innerText = gameState.playerHand[1] === 11 ? 'A' : gameState.playerHand[1];
        }
        function showFeedback(msg, color) {
            const f = document.getElementById('feedback');
            f.innerText = msg; f.className = `text-center mb-6 h-6 ${color}`;
        }
        function refreshStats() {
            const today = loadStats(1);
            const week = loadStats(7);
            document.getElementById('acc-today').innerText = today.accuracy + "%";
            document.getElementById('acc-week').innerText = week.accuracy + "%";
            document.getElementById('top-mistake').innerText = today.topMistake ? `Struggling with hand: ${today.topMistake[0]}` : "Great job! No major mistakes.";
        }
    </script>
</body>
</html>
