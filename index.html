<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackjack Pro Trainer | Mobile Perfect</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    background: radial-gradient(circle at center, #065f46 0%, #022c22 100%);
    font-family: 'Inter', sans-serif;
}

.glass-panel {
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
}

.neon-gold {
    border: 3px solid #fbbf24;
    box-shadow: 0 0 15px rgba(251,191,36,0.4);
}

/* MOBILE CARDS */
.card {
    width: 55px;
    height: 80px;
    font-size: 20px !important;
}

@media (min-width:640px){
    .card { width: 90px; height: 130px; }
}

.hidden-section { display:none; }

.timer-bar {
    height:4px;
    background:#fbbf24;
    width:0%;
    transition: width 1s linear;
}

.correct-flash { animation: flashGreen 0.4s; }
.incorrect-flash { animation: flashRed 0.4s; }

@keyframes flashGreen { 50% { background: rgba(34,197,94,0.3); } }
@keyframes flashRed { 50% { background: rgba(225,29,72,0.3); } }

.disabled-btn {
    opacity:0.3;
    pointer-events:none;
}
</style>
</head>

<body class="text-white min-h-screen overflow-x-hidden">

<nav class="glass-panel sticky top-0 z-50 px-4 py-2 flex justify-between items-center">
    <h1 class="text-lg font-black text-yellow-500 uppercase">
        Blackjack <span class="text-white">Pro</span>
    </h1>

    <div class="flex gap-3 text-xs font-bold uppercase text-slate-400">
        <button onclick="showPage('play')">Training</button>
        <button onclick="showPage('stats')">Insights</button>
        <button onclick="showPage('chart')">Chart</button>
    </div>
</nav>

<main class="w-full px-2">

<section id="page-play" class="flex justify-center">

<div id="table-surface"
class="glass-panel w-full max-w-sm rounded-2xl p-3 flex flex-col justify-between h-[calc(100vh-90px)] border-t-4 border-yellow-600 transition-colors duration-500">

<div>

<div class="text-center mb-2">
<p class="text-[10px] font-black text-yellow-500 uppercase mb-1">
Dealer (<span id="dealer-score">?</span>)
</p>
<div id="dealer-cards" class="flex justify-center gap-2 min-h-[70px]"></div>
</div>

<div class="text-center mb-2">
<div id="player-cards-container" class="flex justify-center gap-2 min-h-[90px] flex-wrap"></div>
<p class="text-xs font-black text-yellow-500 uppercase">
Score: <span id="active-score">0</span>
</p>
</div>

<div id="feedback-box"
class="bg-slate-900/70 rounded-lg py-2 px-2 text-center border border-white/10">
<div id="status-label" class="text-[9px] uppercase text-slate-500">
Decision
</div>
<div id="feedback-text" class="text-sm font-black text-slate-300">
Ready
</div>
</div>

<div class="w-full bg-slate-800 rounded-full mt-2 h-1">
<div id="timer-bar" class="timer-bar"></div>
</div>

</div>

<div class="grid grid-cols-2 gap-2 mt-2">
<button id="btn-H" onclick="handleUserMove('H')" class="py-2 rounded-lg bg-blue-600 font-black text-xs active:scale-90">HIT</button>
<button id="btn-S" onclick="handleUserMove('S')" class="py-2 rounded-lg bg-rose-600 font-black text-xs active:scale-90">STAND</button>
<button id="btn-D" onclick="handleUserMove('D')" class="py-2 rounded-lg bg-amber-500 text-black font-black text-xs active:scale-90">DOUBLE</button>
<button id="btn-Y" onclick="handleUserMove('Y')" class="py-2 rounded-lg bg-indigo-600 font-black text-xs active:scale-90">SPLIT</button>
</div>

</div>

</section>

<!-- OTHER PAGES SAME -->
<section id="page-stats" class="hidden-section max-w-5xl mx-auto">
    <div class="glass-panel p-10 rounded-2xl text-center mb-6">
        <p class="text-sm font-black text-slate-500 mb-3 uppercase">Accuracy</p>
        <p id="acc-today" class="text-5xl font-black text-green-400">0%</p>
    </div>
</section>

<section id="page-chart" class="hidden-section text-center">
    <img src="WhatsApp Image 2026-02-27 at 7.59.41 PM.jpeg" class="rounded-xl mx-auto max-w-full">
</section>

<script>

/* 🔥 YOUR ORIGINAL SCRIPT (UNCHANGED) */

const STRATEGY_MAP = {...}; // KEEP SAME (paste your full map here)

/* ⚠️ IMPORTANT:
PASTE YOUR FULL ORIGINAL SCRIPT EXACTLY HERE
FROM YOUR FILE — STARTING FROM:
let game = { ... } 
TILL:
window.onload = startNewGame;
*/

</script>

</body>
</html>
