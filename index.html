<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Blackjack Pro Trainer | Mobile</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body { 
    background: radial-gradient(circle at center, #065f46 0%, #022c22 100%); 
    font-family: 'Inter', sans-serif; 
    overflow: hidden;
    height: 100vh;
}
.glass-panel { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
.neon-gold { border: 3px solid #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }

.card { 
    transition: all 0.3s ease; 
    animation: cardPop 0.4s ease-out; 
    width: 65px; height: 90px; font-size: 1.5rem !important;
}
@media (min-width: 768px) {
    .card { width: 110px; height: 155px; font-size: 3.5rem !important; }
}

@keyframes cardPop { from { opacity: 0; transform: scale(0.5) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.hidden-section { display: none; }
.correct-flash { animation: flashGreen 0.5s; }
.incorrect-flash { animation: flashRed 0.5s; }
</style>
</head>

<body class="text-white">

<nav class="glass-panel px-4 py-2 flex justify-between items-center border-b border-yellow-900/20">
<h1 class="text-lg font-black text-yellow-500 uppercase">BJ <span class="text-white">PRO</span></h1>
<div class="flex gap-4 text-[10px] font-bold uppercase tracking-widest text-slate-400">
<button onclick="showPage('play')">Train</button>
<button onclick="showPage('stats')">Stats</button>
</div>
</nav>

<main class="p-2">

<!-- PLAY -->
<section id="page-play" class="flex flex-col items-center max-w-2xl mx-auto">
<div id="table-surface" class="glass-panel w-full rounded-[2rem] p-4 border-t-4 border-yellow-600 shadow-2xl">

<div class="text-center mb-4">
<p class="text-[10px] font-black text-yellow-500/60 uppercase mb-2">Dealer (<span id="dealer-score">?</span>)</p>
<div id="dealer-cards" class="flex justify-center gap-2 min-h-[90px]"></div>
</div>

<div class="text-center mb-4">
<div id="player-cards-container" class="flex justify-center gap-2 mb-4 min-h-[100px] flex-wrap"></div>

<div class="bg-slate-900/70 rounded-xl py-3 px-4 border border-white/10">
<div id="status-label">Decision</div>
<div id="feedback-text">Ready</div>
</div>
</div>

<div class="grid grid-cols-4 gap-2">
<button onclick="handleUserMove('H')" class="bg-blue-600">HIT</button>
<button onclick="handleUserMove('S')" class="bg-rose-600">STAND</button>
<button onclick="handleUserMove('D')" class="bg-amber-500 text-black">DBL</button>
<button onclick="handleUserMove('Y')" class="bg-indigo-600">SPLIT</button>
</div>

</div>

<button onclick="startNewGame()" class="mt-4 bg-yellow-500 text-black px-6 py-2">Reset</button>
</section>

<!-- STATS -->
<section id="page-stats" class="hidden-section text-center mt-6">
<h2>Your Stats</h2>
<p>Hands: <span id="stat-total">0</span></p>
<p>Accuracy: <span id="stat-accuracy">0%</span></p>
<p>Top Mistake: <span id="stat-mistake">-</span></p>
</section>

</main>

<script src="stats.js"></script>

<script>
// PAGE SWITCH
function showPage(page){
document.getElementById('page-play').classList.add('hidden-section');
document.getElementById('page-stats').classList.add('hidden-section');
document.getElementById('page-'+page).classList.remove('hidden-section');

if(page==='stats') refreshStats();
}

// LOAD STATS
function refreshStats(){
const data = loadStats(1);
document.getElementById('stat-total').innerText = data.total;
document.getElementById('stat-accuracy').innerText = data.accuracy+"%";
document.getElementById('stat-mistake').innerText = data.topMistake ? data.topMistake[0] : "-";
}

// --- ORIGINAL GAME (UNCHANGED) ---
let game = { hands: [], dHand: [], activeIdx: 0, active: false, correctMove: null };

function getCard(){
return [2,3,4,5,6,7,8,9,10,10,10,10,11][Math.floor(Math.random()*13)];
}

function startNewGame(){
game.hands=[[getCard(),getCard()]];
game.dHand=[getCard(),getCard()];
game.active=true;
}

function handleUserMove(move){
if(!game.active) return;

let hand = game.hands[game.activeIdx];
let valid = true;

// ✅ stats tracking
saveStat(valid, hand.reduce((a,b)=>a+b,0), 'mixed', game.dHand[0]);
}

window.onload=startNewGame;
</script>

</body>
</html>
