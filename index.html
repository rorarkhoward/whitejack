<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackjack Pro Trainer</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    background: radial-gradient(circle at center, #065f46 0%, #022c22 100%);
    font-family: 'Inter', sans-serif;
}

.glass-panel {
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
}

.neon-gold {
    border: 3px solid #fbbf24;
    box-shadow: 0 0 15px rgba(251,191,36,0.4);
}

/* 🔥 PERFECT BALANCE */
.card {
    width: 70px;
    height: 100px;
}

@media (min-width:640px){
    .card { width: 100px; height: 140px; }
}

.timer-bar {
    height:4px;
    background:#fbbf24;
}

.hidden-section { display:none; }

.correct-flash { animation: flashGreen 0.4s; }
.incorrect-flash { animation: flashRed 0.4s; }

@keyframes flashGreen { 50% { background: rgba(34,197,94,0.3); } }
@keyframes flashRed { 50% { background: rgba(225,29,72,0.3); } }

.disabled-btn {
    opacity:0.3;
    pointer-events:none;
}
</style>
</head>

<body class="text-white min-h-screen overflow-x-hidden">

<!-- NAV -->
<nav class="glass-panel px-4 py-2 flex justify-between items-center">
    <h1 class="text-lg font-black text-yellow-500 uppercase">
        Blackjack <span class="text-white">Pro</span>
    </h1>

    <div class="flex gap-3 text-xs font-bold uppercase text-slate-400">
        <button onclick="showPage('play')">Play</button>
        <button onclick="showPage('stats')">Stats</button>
    </div>
</nav>

<main class="w-full flex justify-center">

<!-- GAME -->
<section id="page-play" class="w-full max-w-sm">

<div id="table-surface"
class="glass-panel rounded-2xl p-3 flex flex-col justify-between h-[calc(100vh-70px)] border-t-4 border-yellow-600">

<!-- TOP -->
<div>

<!-- DEALER -->
<div class="text-center mb-2">
<p class="text-xs font-black text-yellow-500 uppercase mb-1">
Dealer (<span id="dealer-score">?</span>)
</p>
<div id="dealer-cards" class="flex justify-center gap-2 min-h-[80px]"></div>
</div>

<!-- PLAYER -->
<div class="text-center mb-2">
<div id="player-cards-container" class="flex justify-center gap-2 min-h-[110px] flex-wrap"></div>
<p class="text-sm font-black text-yellow-500 uppercase">
Score: <span id="active-score">0</span>
</p>
</div>

<!-- SMALL FEEDBACK -->
<div id="feedback-box"
class="bg-slate-900/70 rounded-md py-1 px-2 text-center border border-white/10">
<div id="status-label" class="text-[9px] uppercase text-slate-500">
Decision
</div>
<div id="feedback-text" class="text-sm font-black text-slate-300">
Ready
</div>
</div>

<div class="w-full bg-slate-800 rounded-full mt-2 h-1">
<div id="timer-bar" class="timer-bar"></div>
</div>

</div>

<!-- BIG BUTTONS -->
<div class="grid grid-cols-2 gap-2 mt-2">

<button id="btn-H" onclick="handleUserMove('H')"
class="py-3 rounded-xl bg-blue-600 font-black text-sm active:scale-90">HIT</button>

<button id="btn-S" onclick="handleUserMove('S')"
class="py-3 rounded-xl bg-rose-600 font-black text-sm active:scale-90">STAND</button>

<button id="btn-D" onclick="handleUserMove('D')"
class="py-3 rounded-xl bg-amber-500 text-black font-black text-sm active:scale-90">DOUBLE</button>

<button id="btn-Y" onclick="handleUserMove('Y')"
class="py-3 rounded-xl bg-indigo-600 font-black text-sm active:scale-90">SPLIT</button>

</div>

</div>

</section>

</main>

<script>

/* ✅ ORIGINAL LOGIC (UNCHANGED) */
